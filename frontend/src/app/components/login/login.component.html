<main>
  <form
    class="login-form container"
    #loginForm="ngForm"
    (ngSubmit)="onSubmit()"
  >
    <div>
      <div class="row g-3 align-items-center">
        <div class="col-3">
          <label for="username" class="col-form-label">Usuario</label>
        </div>
        <div class="col-9">
          <input
            type="text"
            name="username"
            [(ngModel)]="username"
            class="form-control"
            aria-describedby="username"
            required
          />
        </div>
      </div>
      <div class="row g-3 align-items-center">
        <div class="col-3">
          <label for="password" class="col-form-label">Contraseña</label>
        </div>
        <div class="col-9">
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            class="form-control"
            aria-describedby="password"
            required
          />
        </div>
      </div>
    </div>
    <div class="d-flex justify-content-center align-content-center">
      ¿No tienes cuenta?
      <a routerLink="/register" class="text-decoration-none ms-3">Registrate</a>
    </div>
    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="loginForm.invalid"
    >
      Iniciar sesión
    </button>
  </form>
</main>
