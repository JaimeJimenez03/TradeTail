<main>
  <form
    class="login-form container"
    #loginForm="ngForm"
    (ngSubmit)="onSubmit()"
  >
    <div>
      <div class="row g-3 align-items-center">
        <div class="col-3">
          <label for="name" class="col-form-label">Nombre</label>
        </div>
        <div class="col-9">
          <input
            type="text"
            name="name"
            [(ngModel)]="user.name"
            class="form-control"
            aria-describedby="name"
            required
          />
        </div>
      </div>

      <div class="row g-3 align-items-center">
        <div class="col-3">
          <label for="first_name" class="col-form-label">Primer Apellido</label>
        </div>
        <div class="col-9">
          <input
            type="text"
            name="first_name"
            [(ngModel)]="user.first_name"
            class="form-control"
            aria-describedby="first_name"
            required
          />
        </div>
      </div>

      <div class="row g-3 align-items-center">
        <div class="col-3">
          <label for="last_name" class="col-form-label">Segundo Apellido</label>
        </div>
        <div class="col-9">
          <input
            type="text"
            name="name"
            [(ngModel)]="user.last_name"
            class="form-control"
            aria-describedby="last_name"
            required
          />
        </div>
      </div>

      <div class="row g-3 align-items-center">
        <div class="col-3">
          <label for="city" class="col-form-label">Ciudad</label>
        </div>
        <div class="col-9">
          <input
            type="text"
            name="city"
            [(ngModel)]="user.city"
            class="form-control"
            aria-describedby="city"
            required
          />
        </div>
      </div>

      <div class="row g-3 align-items-center">
        <div class="col-3">
          <label for="municipality" class="col-form-label">Municipio</label>
        </div>
        <div class="col-9">
          <input
            type="text"
            name="municipality"
            [(ngModel)]="user.municipality"
            class="form-control"
            aria-describedby="municipality"
            required
          />
        </div>
      </div>

      <div class="row g-3 align-items-center">
        <div class="col-3">
          <label for="name" class="col-form-label">Email</label>
        </div>
        <div class="col-9">
          <input
            type="text"
            name="email"
            [(ngModel)]="user.email"
            class="form-control"
            aria-describedby="name"
            required
          />
        </div>
      </div>

      <div class="row g-3 align-items-center">
        <div class="col-3">
          <label for="telephone_number" class="col-form-label"
            >Nº Telefono</label
          >
        </div>
        <div class="col-9">
          <input
            type="number"
            name="telephone_number"
            [(ngModel)]="user.telephone_number"
            class="form-control"
            aria-describedby="telephone_number"
            required
          />
        </div>
      </div>

      <div class="row g-3 align-items-center">
        <div class="col-3">
          <label for="username" class="col-form-label">Usuario</label>
        </div>
        <div class="col-9">
          <input
            type="text"
            name="username"
            [(ngModel)]="user.username"
            class="form-control"
            aria-describedby="username"
            required
          />
        </div>
      </div>

      <div class="row g-3 align-items-center">
        <div class="col-3">
          <label for="password" class="col-form-label">Contraseña</label>
        </div>
        <div class="col-9">
          <input
            type="password"
            name="password"
            [(ngModel)]="user.password"
            class="form-control"
            aria-describedby="password"
            required
          />
        </div>
      </div>

      <div class="row g-3 align-items-center">
        <div class="col-3">
          <label for="avatar" class="col-form-label">Foto de Perfil</label>
        </div>
        <div class="col-9">
          <input
            (change)="onFileSelected($event)"
            type="file"
            name="avatar"
            class="form-control"
            aria-describedby="avatar"
          />
        </div>
      </div>
    </div>
    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="loginForm.invalid"
    >
      Registrarse
    </button>
  </form>
</main>
